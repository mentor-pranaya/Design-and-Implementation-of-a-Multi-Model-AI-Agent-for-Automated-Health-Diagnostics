services:
  - type: web
    name: inbloodo-agent
    runtime: python3
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.12
      - key: API_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: inbloodo-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
    disk:
      name: inbloodo-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

databases:
  - name: inbloodo-db
    databaseName: inbloodo
    user: inbloodo_user
    plan: free



























































































































































































































































































































































































































































































































































































































































































































































































































































































                                                                  