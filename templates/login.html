<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INBLOODO AGENT - Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Reusing the premium background logic */
        .background-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
            animation: gradientShift 20s ease infinite;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(to right, #00f2fe, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-left: 5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            transition: color 0.3s;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 15px 15px 55px;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .input-wrapper input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .input-wrapper input:focus+i {
            color: #00f2fe;
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #00f2fe 0%, #667eea 100%);
            border: none;
            padding: 18px;
            border-radius: 15px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
            filter: brightness(1.1);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .footer-links {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .footer-links a {
            color: #00f2fe;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #667eea;
        }

        #errorMessage {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            border: 1px solid rgba(255, 77, 77, 0.2);
        }

        /* Pulse animation for the logo icon */
        .pulse {
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="background-3d"></div>

    <div class="login-container">
        <div class="logo">
            <i class="fas fa-microscope pulse"></i>
            <span>INBLOODO</span>
        </div>

        <p style="margin-bottom: 30px; color: rgba(255,255,255,0.6); font-weight: 300;">
            Secure AI Blood Report Diagnostics
        </p>

        <div id="errorMessage">Invalid credentials. Please try again.</div>

        <form id="loginForm">
            <div class="input-group">
                <label>Access Identity</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Username or Email" required>
                    <i class="fas fa-user-shield"></i>
                </div>
            </div>

            <div class="input-group">
                <label>Security Key</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fas fa-key"></i>
                </div>
            </div>

            <div class="input-group">
                <label>Access Level</label>
                <div class="input-wrapper">
                    <select id="role" required style="width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px 15px 15px 55px; border-radius: 15px; color: white; font-size: 1rem; outline: none;">
                        <option value="" disabled selected>Select Access Level</option>
                        <option value="patient" style="background: rgba(0,0,0,0.8); color: white;">Patient Access</option>
                        <option value="admin" style="background: rgba(0,0,0,0.8); color: white;">Admin Access</option>
                    </select>
                    <i class="fas fa-shield-alt" style="left: 20px;"></i>
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                Initialize Secure Session
            </button>
        </form>

        <div class="footer-links">
            <span>v2.0.0 Stable</span>
            <a href="#">Forgot Security Key?</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.style.display = 'none';
            loginBtn.textContent = 'Authenticating...';
            loginBtn.style.opacity = '0.7';
            loginBtn.disabled = true;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            try {
                const response = await fetch('/api/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('inbloodo_session', data.access_token);
                    localStorage.setItem('inbloodo_username', username);
                    localStorage.setItem('inbloodo_password', password);
                    localStorage.setItem('inbloodo_role', data.role);
                    window.location.href = '/';
                } else {
                    const errorData = await response.json();
                    errorMessage.textContent = errorData.detail || 'Invalid credentials. Please try again.';
                    errorMessage.style.display = 'block';
                    loginBtn.textContent = 'Initialize Secure Session';
                    loginBtn.style.opacity = '1';
                    loginBtn.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'Server connection error.';
                errorMessage.style.display = 'block';
                loginBtn.textContent = 'Initialize Secure Session';
                loginBtn.style.opacity = '1';
                loginBtn.disabled = false;
            }
        });

        // Clear session if any exists when coming to login
        localStorage.removeItem('inbloodo_session');
    </script>
</body>

</html>
