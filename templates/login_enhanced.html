<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INBLOODO AGENT - Secure Access</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .background-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
            animation: gradientShift 20s ease infinite;
        }

        @keyframes gradientShift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(to right, #00f2fe, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .pulse {
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        .tagline {
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
            font-size: 0.95rem;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 15px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #00f2fe 0%, #667eea 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-left: 5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            transition: color 0.3s;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 15px 15px 55px;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .input-wrapper input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .input-wrapper input:focus+i {
            color: #00f2fe;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #00f2fe 0%, #667eea 100%);
            border: none;
            padding: 18px;
            border-radius: 15px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
            filter: brightness(1.1);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            border: 1px solid;
        }

        .message.error {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
            border-color: rgba(255, 77, 77, 0.2);
        }

        .message.success {
            color: #00f2fe;
            background: rgba(0, 242, 254, 0.1);
            border-color: rgba(0, 242, 254, 0.2);
        }

        .message.show {
            display: block;
        }

        .footer-links {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .footer-links a {
            color: #00f2fe;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #667eea;
        }

        .default-credentials {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 242, 254, 0.05);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 10px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .default-credentials h4 {
            color: #00f2fe;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .default-credentials ul {
            list-style: none;
            text-align: left;
            padding-left: 10px;
        }

        .default-credentials li {
            margin: 5px 0;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>

<body>
    <div class="background-3d"></div>

    <div class="login-container">
        <div class="logo">
            <i class="fas fa-microscope pulse"></i>
            <span>INBLOODO</span>
        </div>

        <p class="tagline">Secure AI Blood Report Diagnostics</p>

        <!-- Tabs for Login/Register -->
        <div class="tabs">
            <button class="tab active" data-tab="login">Login</button>
            <button class="tab" data-tab="register">Register</button>
        </div>

        <!-- Messages -->
        <div id="message" class="message"></div>

        <!-- Login Form -->
        <div id="loginForm" class="form-container active">
            <form id="loginFormSubmit">
                <div class="input-group">
                    <label>Access Identity</label>
                    <div class="input-wrapper">
                        <input type="text" id="loginUsername" placeholder="Username or Email" required>
                        <i class="fas fa-user-shield"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>Security Key</label>
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                        <i class="fas fa-key"></i>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="loginBtn">
                    Initialize Secure Session
                </button>
            </form>

            <!-- Default test credentials -->
            <div class="default-credentials">
                <h4><i class="fas fa-info-circle"></i> Test Credentials</h4>
                <ul>
                    <li>🔹 admin / admin123</li>
                    <li>🔹 doctor / doctor123</li>
                    <li>🔹 patient / patient123</li>
                    <li>🔹 test / secret</li>
                </ul>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="form-container">
            <form id="registerFormSubmit">
                <div class="input-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="registerUsername" placeholder="Choose a username" required>
                        <i class="fas fa-user"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="registerEmail" placeholder="your.email@example.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="registerPassword" placeholder="••••••••" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="registerConfirmPassword" placeholder="••••••••" required>
                        <i class="fas fa-lock-open"></i>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="registerBtn">
                    Create Account
                </button>
            </form>
        </div>

        <div class="footer-links">
            <span>v2.0.0 Enhanced</span>
            <a href="#" id="forgotPassword">Forgot Security Key?</a>
        </div>
    </div>

    <script>
        // Tab switching
        const tabs = document.querySelectorAll('.tab');
        const forms = document.querySelectorAll('.form-container');
        const message = document.getElementById('message');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const targetTab = tab.dataset.tab;

                // Update active tab
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // Update active form
                forms.forEach(f => f.classList.remove('active'));
                document.getElementById(`${targetTab}Form`).classList.add('active');

                // Clear message
                message.classList.remove('show');
            });
        });

        // Show message helper
        function showMessage(text, type = 'error') {
            message.textContent = text;
            message.className = `message ${type} show`;
            setTimeout(() => {
                message.classList.remove('show');
            }, 5000);
        }

        // Login form submission
        const loginFormSubmit = document.getElementById('loginFormSubmit');
        const loginBtn = document.getElementById('loginBtn');

        loginFormSubmit.addEventListener('submit', async (e) => {
            e.preventDefault();
            message.classList.remove('show');
            loginBtn.textContent = 'Authenticating...';
            loginBtn.disabled = true;

            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('/api/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('✅ Login successful! Redirecting...', 'success');
                    localStorage.setItem('inbloodo_session', data.access_token);
                    localStorage.setItem('inbloodo_username', username);
                    localStorage.setItem('inbloodo_role', data.role || 'patient');

                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showMessage('❌ ' + (data.detail || 'Invalid credentials'), 'error');
                    loginBtn.textContent = 'Initialize Secure Session';
                    loginBtn.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('⚠️ Server connection error. Please try again.', 'error');
                loginBtn.textContent = 'Initialize Secure Session';
                loginBtn.disabled = false;
            }
        });

        // Register form submission
        const registerFormSubmit = document.getElementById('registerFormSubmit');
        const registerBtn = document.getElementById('registerBtn');

        registerFormSubmit.addEventListener('submit', async (e) => {
            e.preventDefault();
            message.classList.remove('show');

            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;

            // Validate passwords match
            if (password !== confirmPassword) {
                showMessage('❌ Passwords do not match', 'error');
                return;
            }

            // Validate password strength
            if (password.length < 6) {
                showMessage('❌ Password must be at least 6 characters', 'error');
                return;
            }

            registerBtn.textContent = 'Creating Account...';
            registerBtn.disabled = true;

            try {
                const response = await fetch('/api/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('✅ Account created! Please login.', 'success');

                    // Switch to login tab and pre-fill username
                    setTimeout(() => {
                        tabs[0].click();
                        document.getElementById('loginUsername').value = username;
                        registerFormSubmit.reset();
                    }, 2000);
                } else {
                    showMessage('❌ ' + (data.detail || 'Registration failed'), 'error');
                }
            } catch (error) {
                console.error('Registration error:', error);
                showMessage('⚠️ Server connection error. Please try again.', 'error');
            } finally {
                registerBtn.textContent = 'Create Account';
                registerBtn.disabled = false;
            }
        });

        // Forgot password link
        document.getElementById('forgotPassword').addEventListener('click', (e) => {
            e.preventDefault();
            showMessage('ℹ️ Please contact admin@inbloodo.ai for password reset', 'success');
        });

        // Clear session on page load
        localStorage.removeItem('inbloodo_session');
    </script>
</body>

</html>
